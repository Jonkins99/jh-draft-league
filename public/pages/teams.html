<div x-data="teamsView">

  <!-- ÜBERSICHT -->
  <div x-show="!selectedTeam">
    <header class="mb-8 flex items-start justify-between gap-4">
      <div>
        <p class="font-display text-xs font-semibold uppercase tracking-[0.3em] text-flame-400">Roster</p>
        <h1 class="mt-1 font-display text-4xl font-bold tracking-wide text-ink md:text-5xl">Teams</h1>
        <p class="mt-2 text-mist">Saison 1 · acht Teams. Tippe ein Team an für die Detailansicht.</p>
      </div>
      <button type="button" popovertarget="exp-teams" title="Teams exportieren"
              class="mt-1 grid size-10 shrink-0 place-items-center rounded-xl border border-line text-mist transition-colors hover:text-flame-400">
        <svg viewBox="0 0 24 24" class="size-5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="m8 11 4 4 4-4"/><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
      </button>
    </header>

    <!-- Export-Popover: Teams -->
    <div popover id="exp-teams" class="modal-pop w-[18rem] max-w-[calc(100vw-2rem)] rounded-2xl border border-line bg-panel p-5 text-ink">
      <p class="mb-2 font-display text-sm font-bold uppercase tracking-wider text-ink">Teams exportieren</p>
      <div class="grid grid-cols-4 gap-2">
        <template x-for="f in [['json','JSON'],['xml','XML'],['csv','CSV'],['xlsx','Excel']]" :key="'tm'+f[0]">
          <button type="button" @click="runExport(f[0])" class="rounded-lg border border-line px-2 py-2 text-xs font-semibold text-mist transition-colors hover:border-flame-500/40 hover:text-ink" x-text="f[1]"></button>
        </template>
      </div>
    </div>

    <div x-show="!loaded" class="py-12 text-center text-mist">Lade Teams…</div>

    <div x-show="loaded" class="grid grid-cols-1 gap-5 sm:grid-cols-2 xl:grid-cols-3">
      <template x-for="t in teams" :key="t.id">
        <article @click="open(t.id)"
                 class="cursor-pointer rounded-2xl border border-line bg-panel p-6 transition-colors hover:border-flame-500/40">
          <div class="flex min-w-0 items-center gap-4">
            <img :src="logoUrl(t.logo)" :alt="t.name" loading="lazy" class="size-16 shrink-0 rounded-xl object-contain" />
            <div class="min-w-0">
              <h2 class="truncate font-display text-xl font-bold tracking-wide" :style="`color:${playerColor(t.player)}`" x-text="t.name" :title="t.name"></h2>
              <span class="mt-1 inline-flex max-w-full items-center truncate rounded-full px-2.5 py-0.5 text-xs font-semibold"
                    :style="`color:${playerColor(t.player)}; background:${playerColor(t.player)}1f`"
                    x-text="t.player"></span>
            </div>
          </div>

          <div class="mt-5 flex items-center justify-between border-t border-line pt-4">
            <span class="font-display text-xs font-semibold uppercase tracking-wider text-mist">Roster</span>
            <span class="font-display font-bold tabular-nums text-ink" x-text="`${(t.pokemon || []).length} / 10`"></span>
          </div>

          <div x-show="(t.pokemon || []).length" class="mt-3 grid grid-cols-5 gap-1.5">
            <template x-for="p in (t.pokemon || [])" :key="p.name">
              <div class="grid aspect-square place-items-center rounded-lg bg-elevated" :title="`${p.name} · Tier ${p.tier}`">
                <img :src="p.image" :alt="p.name" loading="lazy" class="size-11 object-contain" />
              </div>
            </template>
          </div>
          <p x-show="!(t.pokemon || []).length" class="mt-3 text-sm text-mist">Roster wird im Draft gefüllt.</p>
        </article>
      </template>
    </div>
  </div>

  <!-- DETAILANSICHT -->
  <template x-if="selectedTeam">
    <div>
      <button type="button" @click="close()"
              class="mb-6 inline-flex items-center gap-2 font-display text-sm font-semibold uppercase tracking-wider text-mist transition-colors hover:text-flame-400">
        <svg viewBox="0 0 24 24" class="size-4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        Alle Teams
      </button>

      <section class="overflow-hidden rounded-2xl border border-flame-500/30 bg-gradient-to-br from-flame-500/10 to-panel p-6 md:p-8">
        <div class="flex flex-wrap items-center gap-6">
          <div class="relative shrink-0">
            <div class="absolute inset-2 -z-10 rounded-full bg-flame-500/20 blur-2xl"></div>
            <img :src="logoUrl(selectedTeam.logo)" :alt="selectedTeam.name" class="size-20 rounded-2xl object-contain sm:size-28" />
          </div>
          <div class="min-w-0">
            <h1 class="break-words font-display text-3xl font-bold tracking-wide sm:text-4xl md:text-5xl" :style="`color:${playerColor(selectedTeam.player)}`" x-text="selectedTeam.name"></h1>
            <div class="mt-3 flex flex-wrap items-center gap-3">
              <span class="inline-flex max-w-full items-center truncate rounded-full px-3 py-1 text-sm font-semibold"
                    :style="`color:${playerColor(selectedTeam.player)}; background:${playerColor(selectedTeam.player)}1f`"
                    x-text="selectedTeam.player"></span>
              <span class="font-display text-sm font-semibold uppercase tracking-wider text-mist"
                    x-text="`${(selectedTeam.pokemon || []).length} / 10 Pokémon`"></span>
            </div>
          </div>
        </div>
      </section>

      <section class="mt-8">
        <h2 class="mb-4 font-display text-xl font-bold uppercase tracking-wider text-ink">Kader</h2>

        <div x-show="(selectedTeam.pokemon || []).length" class="grid grid-cols-2 gap-4 sm:grid-cols-3 lg:grid-cols-5">
          <template x-for="p in rosterByTier(selectedTeam)" :key="p.name">
            <div @click.stop="goMon(p.name)"
                 class="cursor-pointer rounded-2xl border border-line bg-panel p-4 transition-colors hover:border-flame-500/40">
              <div class="relative grid aspect-square place-items-center rounded-xl bg-elevated/60">
                <span class="absolute left-2 top-2 grid size-6 place-items-center rounded font-display text-xs font-bold"
                      :style="`color:${tierColor(p.tier)}; background:${tierColor(p.tier)}26`" x-text="p.tier"></span>
                <img :src="p.image" :alt="p.name" loading="lazy" class="h-4/5 w-4/5 object-contain" />
              </div>
              <p class="mt-3 truncate font-semibold text-ink" x-text="p.name" :title="p.name"></p>
              <div class="mt-2 flex flex-wrap gap-1">
                <template x-for="t in p.types" :key="t">
                  <span class="rounded px-1.5 py-0.5 text-[10px] font-bold uppercase tracking-wide"
                        :style="`color:${typeColor(t)}; background:${typeColor(t)}22`" x-text="t"></span>
                </template>
              </div>
            </div>
          </template>
        </div>

        <p x-show="!(selectedTeam.pokemon || []).length" class="rounded-xl border border-line bg-panel p-6 text-mist">
          Dieses Team hat noch keine Pokémon gedraftet.
        </p>
      </section>

      <!-- MODUL: Speed-Tiers (errechnete Initiative auf Lvl 50) -->
      <section x-show="(selectedTeam.pokemon || []).length" class="mt-6 rounded-2xl border border-line bg-panel p-5 sm:p-6">
        <div class="mb-4">
          <h2 class="font-display text-xl font-bold uppercase tracking-wider text-ink">Speed-Tiers</h2>
          <p class="mt-1 text-sm text-mist">Errechnete Initiative (Lvl 50): <b>0</b> SP, <b>32</b> SP und <b>32+</b> (32 SP mit positivem Wesen). Pro Pokémon optional ×1,5 (Boost/Wahlschal) und ×2 (Rückenwind/Wassertempo).</p>
        </div>

        <!-- Steuerung je Pokémon -->
        <div class="mb-5 grid gap-2 sm:grid-cols-2">
          <template x-for="mon in speedMons" :key="'spd-'+mon.name">
            <div class="flex min-w-0 items-center gap-2 rounded-xl border border-line bg-elevated/60 p-2 transition-opacity"
                 :class="spdGet(mon.name).show ? '' : 'opacity-50'">
              <button type="button" @click.stop="goMon(mon.name)"
                      class="flex min-w-0 flex-1 cursor-pointer items-center gap-2 text-left transition-colors hover:text-flame-400">
                <img :src="mon.image" :alt="mon.name" loading="lazy" class="size-9 shrink-0 object-contain" />
                <span class="min-w-0 flex-1 truncate text-sm font-semibold text-ink" x-text="mon.name" :title="mon.name"></span>
              </button>
              <div class="flex shrink-0 gap-1">
                <button type="button" @click="spdToggle(mon.name,'show')"
                        class="grid size-8 place-items-center rounded-lg border border-line text-mist transition-colors"
                        :style="spdGet(mon.name).show ? 'border-color:#e3350d;background:#e3350d22;color:#ff5a36' : ''"
                        :title="spdGet(mon.name).show ? 'In Tabelle anzeigen (an)' : 'In Tabelle anzeigen (aus)'" :aria-pressed="spdGet(mon.name).show">
                  <svg viewBox="0 0 24 24" class="size-4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path x-show="spdGet(mon.name).show" d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/>
                    <circle x-show="spdGet(mon.name).show" cx="12" cy="12" r="3"/>
                    <path x-show="!spdGet(mon.name).show" d="M3 3l18 18M10.6 10.6a3 3 0 0 0 4.2 4.2M9.9 5.2A9.5 9.5 0 0 1 12 5c6.5 0 10 7 10 7a17 17 0 0 1-3.2 3.9M6.6 6.6A17 17 0 0 0 2 12s3.5 7 10 7a9.6 9.6 0 0 0 3-.5"/>
                  </svg>
                </button>
                <button type="button" @click="spdToggle(mon.name,'x15')"
                        class="h-8 rounded-lg border border-line px-2 text-xs font-bold text-mist transition-colors"
                        :style="spdGet(mon.name).x15 ? 'border-color:#4d90d5;background:#4d90d522;color:#7fb2e8' : ''"
                        :aria-pressed="spdGet(mon.name).x15">×1,5</button>
                <button type="button" @click="spdToggle(mon.name,'x2')"
                        class="h-8 rounded-lg border border-line px-2 text-xs font-bold text-mist transition-colors"
                        :style="spdGet(mon.name).x2 ? 'border-color:#63bc5a;background:#63bc5a22;color:#8fd588' : ''"
                        :aria-pressed="spdGet(mon.name).x2">×2</button>
              </div>
            </div>
          </template>
        </div>

        <!-- Tabelle -->
        <div x-show="speedReady && speedRows.length">
          <table class="w-full table-fixed border-collapse text-sm">
            <colgroup>
              <col />
              <col class="w-12 sm:w-16" />
              <col class="w-14 sm:w-20" />
              <col class="w-12 sm:w-16" />
            </colgroup>
            <thead>
              <tr class="border-b border-line">
                <th class="py-2 pr-2 text-left font-display text-xs font-semibold uppercase tracking-wider text-mist">Pokémon</th>
                <th class="px-1 py-2 text-left font-display text-xs font-semibold uppercase tracking-wider text-mist sm:px-2">SP</th>
                <th class="px-1 py-2 text-left font-display text-xs font-semibold uppercase tracking-wider text-mist sm:px-2">Mod.</th>
                <th class="py-2 pl-1 text-right sm:pl-2">
                  <button type="button" @click="toggleSpdSort()" class="inline-flex items-center gap-1 font-display text-xs font-semibold uppercase tracking-wider text-mist transition-colors hover:text-ink">
                    Init <span class="text-flame-400" x-text="spdSort === 'desc' ? '↓' : '↑'"></span>
                  </button>
                </th>
              </tr>
            </thead>
            <tbody>
              <template x-for="r in speedRows" :key="r.id">
                <tr class="border-b border-line/50">
                  <td class="py-1.5 pr-2">
                    <div @click.stop="goMon(r.mon.name)"
                         class="flex cursor-pointer items-center gap-2 transition-colors hover:text-flame-400">
                      <img :src="r.mon.image" :alt="r.mon.name" loading="lazy" class="size-7 shrink-0 object-contain" />
                      <span class="min-w-0 truncate font-medium text-ink" x-text="r.mon.name" :title="r.mon.name"></span>
                    </div>
                  </td>
                  <td class="px-1 py-1.5 sm:px-2">
                    <span class="inline-block rounded px-1.5 py-0.5 text-xs font-bold" :style="`color:${invColor(r.invKey)};background:${invColor(r.invKey)}1f`" x-text="r.inv"></span>
                  </td>
                  <td class="px-1 py-1.5 sm:px-2">
                    <span class="inline-block rounded px-1.5 py-0.5 text-xs font-bold" :style="`color:${modColor(r.modKey)};background:${modColor(r.modKey)}1f`" x-text="r.mod"></span>
                  </td>
                  <td class="py-1.5 pl-1 text-right font-display text-lg font-bold tabular-nums text-ink sm:pl-2" x-text="r.speed"></td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
        <p x-show="speedReady && !speedRows.length" class="text-sm text-mist">Keine Pokémon ausgewählt.</p>
        <p x-show="!speedReady" class="text-sm text-mist">Lade Initiative-Daten…</p>
      </section>

      <!-- MODUL: Schwächen & Resistenzen (Team-Defensivprofil je Angriffstyp) -->
      <section x-show="(selectedTeam.pokemon || []).length" class="mt-6 rounded-2xl border border-line bg-panel p-5 sm:p-6">
        <div class="mb-4">
          <h2 class="font-display text-xl font-bold uppercase tracking-wider text-ink">Schwächen &amp; Resistenzen</h2>
          <p class="mt-1 text-sm text-mist">Defensiv-Profil je Angriffstyp. Pokémon antippen, um sie aus der Auswertung auszuschließen.</p>
        </div>

        <!-- Pokémon-Auswahl -->
        <div class="mb-5 flex flex-wrap gap-2">
          <template x-for="mon in speedMons" :key="'wk-'+mon.name">
            <button type="button" @click="toggleWeak(mon.name)"
                    class="flex items-center gap-1.5 rounded-full border py-1 pl-1 pr-2.5 text-sm font-semibold transition-colors"
                    :class="weakIncluded(mon.name) ? 'border-flame-500/40 bg-flame-500/10 text-ink' : 'border-line text-mist opacity-50'"
                    :aria-pressed="weakIncluded(mon.name)">
              <img :src="mon.image" :alt="mon.name" loading="lazy" class="size-6 shrink-0 object-contain" :class="weakIncluded(mon.name) ? '' : 'grayscale'" />
              <span class="max-w-[6.5rem] truncate" x-text="mon.name"></span>
            </button>
          </template>
        </div>

        <template x-if="weakMons.length">
          <div>
            <!-- Übersichtskarten je Typ (größte Schwächen zuerst) -->
            <div class="grid grid-cols-2 gap-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6">
              <template x-for="t in weakSummary" :key="'sum-'+t.type">
                <div class="rounded-xl border border-line bg-elevated/60 p-2.5"
                     :style="t.net > 0 ? 'border-color:rgba(227,53,13,0.35)' : (t.net < 0 ? 'border-color:rgba(99,188,90,0.35)' : '')">
                  <span class="inline-block rounded px-1.5 py-0.5 text-[10px] font-bold uppercase tracking-wide" :style="`color:${typeColor(t.type)};background:${typeColor(t.type)}22`" x-text="t.type"></span>
                  <div class="mt-2 flex items-center gap-1.5 font-display text-base font-bold tabular-nums">
                    <span class="text-flame-400" :class="t.weak ? '' : 'opacity-25'" x-text="t.weak"></span>
                    <span class="text-mist/40 text-xs">/</span>
                    <span :class="(t.resist + t.immune) ? '' : 'opacity-25'" :style="'color:#63bc5a'" x-text="t.resist + t.immune"></span>
                    <span x-show="t.immune" class="ml-auto rounded bg-mist/15 px-1 text-[9px] font-bold text-mist" x-text="t.immune + '× immun'"></span>
                  </div>
                  <div class="mt-0.5 text-[10px] text-mist">schwach / stark</div>
                </div>
              </template>
            </div>

            <!-- Detail-Matrix: Pokémon × Angriffstyp -->
            <div class="mt-5 -mx-1 overflow-x-auto px-1">
              <table class="border-collapse text-center text-xs">
                <thead>
                  <tr>
                    <th class="sticky left-0 z-10 bg-panel py-1.5 pr-2 text-left font-display text-[10px] font-semibold uppercase tracking-wider text-mist">Pokémon</th>
                    <template x-for="ty in allTypes" :key="'h-'+ty">
                      <th class="px-0.5 py-1">
                        <span class="inline-block w-9 rounded py-0.5 text-[9px] font-bold" :style="`color:${typeColor(ty)};background:${typeColor(ty)}22`" x-text="typeAbbr(ty)" :title="ty"></span>
                      </th>
                    </template>
                  </tr>
                </thead>
                <tbody>
                  <template x-for="row in weakMatrix" :key="'m-'+row.name">
                    <tr class="border-t border-line/40">
                      <td class="sticky left-0 z-10 bg-panel py-1 pr-2 text-left">
                        <div @click.stop="goMon(row.name)"
                             class="flex cursor-pointer items-center gap-1.5 transition-colors hover:text-flame-400">
                          <img :src="row.image" :alt="row.name" loading="lazy" class="size-6 shrink-0 object-contain" />
                          <span class="max-w-[5.5rem] truncate font-medium text-ink" x-text="row.name" :title="row.name"></span>
                        </div>
                      </td>
                      <template x-for="c in row.cells" :key="row.name+'-'+c.type">
                        <td class="p-0.5">
                          <span class="grid h-7 w-9 place-items-center rounded font-bold tabular-nums" :style="multStyle(c.mult)" x-text="multLabel(c.mult)" :title="row.name + ' · ' + c.type + ': ×' + c.mult"></span>
                        </td>
                      </template>
                    </tr>
                  </template>
                </tbody>
                <tfoot>
                  <tr class="border-t border-line">
                    <td class="sticky left-0 z-10 bg-panel py-1.5 pr-2 text-left font-display text-[10px] font-semibold uppercase tracking-wider text-flame-400">Schwach</td>
                    <template x-for="t in weakByType" :key="'fw-'+t.type">
                      <td class="p-0.5"><span class="font-display font-bold tabular-nums text-flame-400" :class="t.weak ? '' : 'opacity-25'" x-text="t.weak"></span></td>
                    </template>
                  </tr>
                  <tr>
                    <td class="sticky left-0 z-10 bg-panel py-1.5 pr-2 text-left font-display text-[10px] font-semibold uppercase tracking-wider" style="color:#63bc5a">Stark</td>
                    <template x-for="t in weakByType" :key="'fr-'+t.type">
                      <td class="p-0.5"><span class="font-display font-bold tabular-nums" :class="(t.resist + t.immune) ? '' : 'opacity-25'" style="color:#63bc5a" x-text="t.resist + t.immune"></span></td>
                    </template>
                  </tr>
                </tfoot>
              </table>
            </div>
          </div>
        </template>
        <p x-show="!weakMons.length" class="text-sm text-mist">Alle Pokémon ausgeschlossen — bitte mindestens eines auswählen.</p>
      </section>

      <!-- MODUL: Saison-Kontext (Platz, Ergebnisse, Verlauf) -->
      <section class="mt-10">
        <h2 class="mb-4 font-display text-xl font-bold uppercase tracking-wider text-ink">Saison</h2>
        <div class="grid grid-cols-1 gap-6 lg:grid-cols-2">
          <div class="min-w-0 rounded-2xl border border-line bg-panel p-6">
            <p class="font-display text-xs font-semibold uppercase tracking-wider text-mist">Tabellenplatz</p>
            <div class="mt-1 flex items-end gap-3">
              <span class="font-display text-5xl font-bold text-ink" x-text="teamPlace ? `#${teamPlace}` : '—'"></span>
              <span x-show="teamRow" class="pb-1.5 font-display text-lg font-semibold text-flame-400" x-text="teamRow ? `${teamRow.points} Pkt` : ''"></span>
            </div>
            <div x-show="teamRow" class="mt-4 grid grid-cols-3 gap-2 text-center sm:gap-3">
              <div class="rounded-xl bg-elevated p-2.5 sm:p-3">
                <div class="font-display text-base font-bold tabular-nums text-ink sm:text-lg" x-text="teamRow ? `${teamRow.won}-${teamRow.draw}-${teamRow.lost}` : ''"></div>
                <div class="mt-0.5 text-xs text-mist">S-U-N</div>
              </div>
              <div class="rounded-xl bg-elevated p-2.5 sm:p-3">
                <div class="font-display text-base font-bold tabular-nums text-ink sm:text-lg" x-text="teamRow ? `${teamRow.kills}:${teamRow.deaths}` : ''"></div>
                <div class="mt-0.5 text-xs text-mist">K:D</div>
              </div>
              <div class="rounded-xl bg-elevated p-2.5 sm:p-3">
                <div class="font-display text-base font-bold tabular-nums text-ink sm:text-lg" x-text="teamRow ? fmtDiff(teamRow.diff) : ''"></div>
                <div class="mt-0.5 text-xs text-mist">Diff</div>
              </div>
            </div>
          </div>

          <div class="min-w-0 rounded-2xl border border-line bg-panel p-6">
            <p class="font-display text-xs font-semibold uppercase tracking-wider text-mist">Platzierungsverlauf</p>
            <div x-show="teamCurve.hasData" class="mt-3 overflow-x-auto" x-html="teamCurveSvg"></div>
            <p x-show="!teamCurve.hasData" class="mt-3 py-8 text-center text-sm text-mist">Noch keine gespielten Spieltage.</p>
          </div>
        </div>

        <div class="mt-6 rounded-2xl border border-line bg-panel p-6">
          <p class="mb-2 font-display text-xs font-semibold uppercase tracking-wider text-mist">Ergebnisse</p>
          <ul class="divide-y divide-line">
            <template x-for="m in teamResults" :key="m.id">
              <li @click="$dispatch('navigate', { key: 'spieltag', matchId: m.id })"
                  class="flex cursor-pointer flex-wrap items-center gap-x-3 gap-y-2 rounded-lg px-2 py-3 transition-colors hover:bg-elevated/40">
                <span class="w-12 shrink-0 font-display text-xs font-semibold text-mist" x-text="`ST ${m.day}`"></span>
                <div @click.stop="open(m.opponent.id)"
                     class="flex min-w-0 flex-1 cursor-pointer items-center gap-3 text-ink transition-colors hover:text-flame-400">
                  <img :src="logoUrl(m.opponent?.logo)" :alt="m.opponent?.name" loading="lazy" class="size-8 shrink-0 rounded-lg object-contain" />
                  <span class="min-w-0 truncate"><span class="text-mist">vs</span> <span :style="`color:${playerColor(m.opponent?.player)}`" x-text="m.opponent?.name"></span></span>
                </div>
                <div class="flex shrink-0 items-center gap-1">
                  <template x-for="(b, bi) in m.battles" :key="bi">
                    <span class="grid h-6 min-w-[2.5rem] place-items-center rounded px-1.5 text-xs font-bold tabular-nums"
                          :class="!b.done ? 'bg-elevated text-mist/40' : (b.outcome === 'win' ? 'bg-volt-400/15 text-volt-400' : (b.outcome === 'loss' ? 'bg-flame-500/15 text-flame-400' : 'bg-elevated text-mist'))"
                          x-text="b.done ? `${b.own}:${b.opp}` : '–'"></span>
                  </template>
                </div>
                <span x-show="m.done" class="w-10 shrink-0 text-right font-display text-sm font-bold tabular-nums"
                      :class="m.outcome === 'win' ? 'text-volt-400' : (m.outcome === 'loss' ? 'text-flame-400' : 'text-mist')"
                      x-text="`${m.ownWins}:${m.oppWins}`"></span>
                <span x-show="!m.done" class="w-10 shrink-0 text-right text-sm text-mist">offen</span>
              </li>
            </template>
          </ul>
          <p x-show="teamResults.length === 0" class="text-sm text-mist">Noch keine Spiele.</p>
        </div>
      </section>

      <!-- MODUL: Pokémon-Ranking des Teams (konfigurierbare Tabelle) -->
      <section class="mt-6 rounded-2xl border border-line bg-panel p-4 sm:p-6">
        <div class="mb-4 flex items-center justify-between gap-3">
          <h2 class="font-display text-xl font-bold uppercase tracking-wider text-ink">Pokémon-Ranking</h2>
          <div class="flex items-center gap-2">
            <button type="button" @click="toggleView()" :title="viewMode === 'table' ? 'Zur Kachel-Ansicht' : 'Zur Tabellen-Ansicht'"
                    class="inline-flex items-center gap-1.5 rounded-lg border border-line px-3 py-2 text-sm font-semibold text-mist transition-colors hover:text-flame-400">
              <svg x-show="viewMode === 'table'" viewBox="0 0 24 24" class="size-4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
              <svg x-show="viewMode === 'cards'" viewBox="0 0 24 24" class="size-4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 5h18M3 12h18M3 19h18"/></svg>
              <span x-text="viewMode === 'table' ? 'Kacheln' : 'Tabelle'"></span>
            </button>
            <button type="button" popovertarget="cols-team"
                    class="inline-flex items-center gap-1.5 rounded-lg border border-line px-3 py-2 text-sm font-semibold text-mist transition-colors hover:text-flame-400">
              <svg viewBox="0 0 24 24" class="size-4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
              Spalten
            </button>
          </div>
        </div>

        <div x-show="viewMode === 'table'" class="-mx-1 overflow-x-auto px-1">
          <table class="min-w-max border-collapse text-sm">
            <thead>
              <tr class="border-b border-line">
                <th class="sticky left-0 z-10 bg-panel py-2 pr-3 text-left font-display text-xs font-semibold uppercase tracking-wider text-mist">Pokémon</th>
                <template x-for="c in visibleCols()" :key="'th-'+c.key">
                  <th class="whitespace-nowrap px-3 py-2 text-right">
                    <span class="inline-flex items-center gap-1">
                      <button type="button" @click="sortByCol(c.key)" class="inline-flex items-center gap-1 font-display text-xs font-semibold uppercase tracking-wider transition-colors"
                              :class="sortKey === c.key ? 'text-flame-400' : 'text-mist hover:text-ink'">
                        <span x-text="c.short"></span>
                        <span x-show="sortKey === c.key" x-text="sortDir === 'desc' ? '↓' : '↑'"></span>
                      </button>
                      <button type="button" @click="statInfo(c.key)" class="text-mist/60 transition-colors hover:text-flame-400" aria-label="Erklärung">
                        <svg viewBox="0 0 24 24" class="size-3.5" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 11v5" stroke-linecap="round"/><circle cx="12" cy="7.6" r="0.6" fill="currentColor"/></svg>
                      </button>
                    </span>
                  </th>
                </template>
              </tr>
            </thead>
            <tbody>
              <template x-for="(s, i) in teamRanking" :key="s.pokemon.name">
                <tr class="cursor-pointer border-b border-line/40 transition-colors hover:bg-elevated/40" @click="goMon(s.pokemon.name)">
                  <td class="sticky left-0 z-10 bg-panel py-2 pr-3">
                    <div class="flex items-center gap-2">
                      <span class="w-5 shrink-0 text-right font-display text-xs font-bold tabular-nums text-mist/60" x-text="i + 1"></span>
                      <img :src="s.pokemon.image" :alt="s.pokemon.name" loading="lazy" class="size-8 shrink-0 object-contain" />
                      <p class="max-w-[9rem] truncate font-semibold text-ink" x-text="s.pokemon.name" :title="s.pokemon.name"></p>
                    </div>
                  </td>
                  <template x-for="c in visibleCols()" :key="s.pokemon.name+'-'+c.key">
                    <td class="whitespace-nowrap px-3 py-2 text-right font-display tabular-nums"
                        :class="sortKey === c.key ? 'font-bold text-flame-400' : 'text-ink'" x-text="colValue(s, c.key)"></td>
                  </template>
                </tr>
              </template>
            </tbody>
          </table>
        </div>

        <!-- Kachel-Ansicht -->
        <div x-show="viewMode === 'cards'" class="grid grid-cols-2 gap-3 sm:grid-cols-3 lg:grid-cols-4">
          <template x-for="(s, i) in teamRanking" :key="'card-'+s.pokemon.name">
            <div class="cursor-pointer rounded-xl border border-line bg-elevated/40 p-3 transition-colors hover:border-flame-500/50" @click="goMon(s.pokemon.name)">
              <div class="flex items-center gap-2">
                <span class="w-5 shrink-0 text-right font-display text-xs font-bold tabular-nums text-mist/60" x-text="i + 1"></span>
                <img :src="s.pokemon.image" :alt="s.pokemon.name" loading="lazy" class="size-10 shrink-0 object-contain" />
                <p class="min-w-0 flex-1 truncate font-semibold text-ink" x-text="s.pokemon.name" :title="s.pokemon.name"></p>
              </div>
              <div class="mt-3 grid grid-cols-2 gap-1.5">
                <template x-for="c in visibleCols()" :key="s.pokemon.name+'-c-'+c.key">
                  <div class="flex items-baseline justify-between rounded-lg bg-panel px-2 py-1"
                       :class="sortKey === c.key ? 'ring-1 ring-flame-500/50' : ''">
                    <span class="truncate text-[11px] uppercase tracking-wide text-mist" x-text="c.short" :title="c.label"></span>
                    <span class="font-display text-sm font-bold tabular-nums" :class="sortKey === c.key ? 'text-flame-400' : 'text-ink'" x-text="colValue(s, c.key)"></span>
                  </div>
                </template>
              </div>
            </div>
          </template>
        </div>

        <p x-show="teamRanking.length === 0" class="mt-2 text-sm text-mist">Noch keine Daten.</p>
      </section>

      <!-- Spalten-Popover (Team-Ranking) -->
      <div popover id="cols-team" class="modal-pop w-[20rem] max-w-[calc(100vw-2rem)] rounded-2xl border border-line bg-panel p-4 text-ink"
           @pointermove.window="colDragMove($event)" @pointerup.window="colDragEnd()">
        <p class="font-display text-sm font-bold uppercase tracking-wider text-ink">Spalten</p>
        <p class="mb-3 mt-0.5 text-xs text-mist">Häkchen blendet ein/aus · Griff zum Umsortieren ziehen.</p>
        <ul class="space-y-1">
          <template x-for="c in orderedCatalog()" :key="'tcol-'+c.key">
            <li :data-col-key="c.key"
                class="flex items-center gap-2 rounded-lg border border-line bg-elevated/50 px-2 py-2 transition-colors"
                :class="_dragKey === c.key ? 'opacity-60 ring-1 ring-flame-500/60' : ''">
              <span class="col-grip shrink-0 cursor-grab text-mist" @pointerdown="colDragStart(c.key, $event)" title="Ziehen zum Umsortieren">
                <svg viewBox="0 0 24 24" class="size-4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 6h.01M9 12h.01M9 18h.01M15 6h.01M15 12h.01M15 18h.01"/></svg>
              </span>
              <label class="flex min-w-0 flex-1 cursor-pointer items-center gap-2">
                <input type="checkbox" :checked="colVisible[c.key]" @change="toggleCol(c.key)" class="size-4 shrink-0 accent-flame-500" />
                <span class="min-w-0 flex-1 truncate text-sm text-ink" x-text="c.label"></span>
              </label>
              <button type="button" @click="statInfo(c.key)" class="shrink-0 text-mist/60 transition-colors hover:text-flame-400" aria-label="Erklärung">
                <svg viewBox="0 0 24 24" class="size-4" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 11v5" stroke-linecap="round"/><circle cx="12" cy="7.6" r="0.6" fill="currentColor"/></svg>
              </button>
            </li>
          </template>
        </ul>
      </div>
    </div>
  </template>

</div>
