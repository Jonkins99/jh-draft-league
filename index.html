<!DOCTYPE html>
<html lang="de">
<head>
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JH Draft League</title>
  <link rel="stylesheet" href="./resources/css/style.css">
  <meta name="robots" content="noindex,nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen bg-void font-sans text-ink antialiased selection:bg-flame-500/30">
  <div class="pointer-events-none fixed inset-0 -z-10 bg-[radial-gradient(75%_45%_at_88%_-8%,rgba(227,53,13,0.12),transparent_60%)]"></div>
  <!-- Gate -->
  <div x-data="gate()" x-cloak>

    <div x-show="!unlocked" class="fixed inset-0 z-100 grid place-items-center bg-void px-6">
      <form @submit.prevent="submit()" class="w-full max-w-sm rounded-2xl border border-line bg-panel p-8 text-center">
        <div class="relative mx-auto w-fit">
          <div class="absolute inset-2 -z-10 rounded-full bg-flame-500/20 blur-2xl"></div>
          <img src="resources/img/logo.png" alt="JH Draft League" class="w-28" />
        </div>
        <h1 class="mt-6 font-display text-2xl font-bold tracking-wide text-ink">Zugang zur Liga</h1>
        <p class="mt-1 text-sm text-mist">Bitte gib das Passwort ein, um fortzufahren.</p>
        <input type="password" name="password" x-model="pw" placeholder="Passwort" autocomplete="current-password"
               class="mt-6 w-full rounded-xl border bg-elevated px-4 py-3 text-ink placeholder:text-mist focus:outline-none"
               :class="error ? 'border-flame-500' : 'border-line focus:border-flame-500'" />
        <p x-show="error" x-cloak class="mt-2 text-sm font-semibold text-flame-400">Falsches Passwort. Bitte erneut versuchen.</p>
        <button type="submit" :disabled="checking"
                class="mt-4 w-full rounded-xl bg-flame-500 px-4 py-3 font-display font-bold uppercase tracking-wide text-white transition-colors hover:bg-flame-600 disabled:opacity-60">
          Freischalten
        </button>
      </form>
    </div>

  <div x-show="unlocked" id="app" x-data="app()" x-init="initApp(); load(current, { animate: false })"
       @navigate.window="onNavigate($event.detail)" @toast.window="pushToast($event.detail)">

    <header class="fixed inset-x-0 top-0 z-40 flex h-16 items-center justify-between border-b border-line bg-void/85 px-4 backdrop-blur md:hidden">
      <img src="resources/img/logo.png" alt="JH Draft League" class="h-11 w-auto" />
      <div class="flex items-center gap-2">
        <button type="button" @click="openSearch()" aria-label="Suche öffnen"
                class="grid size-11 place-items-center rounded-xl border border-line text-mist transition-colors hover:text-flame-400">
          <svg viewBox="0 0 24 24" class="size-5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        </button>
        <button type="button" class="pokeball" popovertarget="mobile-nav" aria-label="Navigation öffnen"></button>
      </div>
    </header>

    <nav id="mobile-nav" popover="manual" aria-label="Hauptnavigation">
      <div class="flex h-16 items-center justify-between border-b border-line px-4">
        <img src="resources/img/logo.png" alt="JH Draft League" class="h-11 w-auto" />
        <button type="button" class="pokeball" popovertarget="mobile-nav" aria-label="Navigation schließen"></button>
      </div>
      <div class="grid gap-2 p-5">
        <template x-for="item in items" :key="item.key">
          <a href="#" @click.prevent="load(item.key)"
             class="flex items-center gap-4 rounded-xl px-4 py-4 font-display text-2xl font-semibold tracking-wide transition-colors"
             :class="isActive(item.key)
               ? 'bg-flame-500/12 text-ink ring-1 ring-inset ring-flame-500/40'
               : 'text-mist hover:bg-elevated hover:text-ink'">
            <span class="size-7 shrink-0" :class="isActive(item.key) ? 'text-flame-400' : ''" x-html="item.icon"></span>
            <span x-text="item.label"></span>
          </a>
        </template>
      </div>
    </nav>

    <div class="md:grid md:min-h-screen md:grid-cols-[18rem_1fr]">

      <aside class="sticky top-0 hidden h-screen flex-col border-r border-line bg-panel/50 backdrop-blur md:flex">
        <div class="px-6 pb-6 pt-8">
          <div class="relative mx-auto w-fit">
            <div class="absolute inset-2 -z-10 rounded-full bg-flame-500/20 blur-2xl"></div>
            <img src="resources/img/logo.png" alt="JH Draft League" class="w-40" />
          </div>
        </div>

        <div class="px-4 pb-4">
          <button type="button" @click="openSearch()"
                  class="flex w-full items-center gap-2.5 rounded-xl border border-line bg-elevated/60 px-3.5 py-2.5 text-left text-mist transition-colors hover:border-flame-500/40 hover:text-ink">
            <svg viewBox="0 0 24 24" class="size-4 shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
            <span class="flex-1 text-sm">Suche…</span>
            <kbd class="rounded border border-line bg-void px-1.5 py-0.5 font-display text-[10px] font-semibold tracking-wide text-mist" x-text="shortcutHint"></kbd>
          </button>
        </div>

        <nav class="min-h-0 flex-1 overflow-y-auto px-4">
          <p class="px-3.5 pb-2 font-display text-xs font-semibold uppercase tracking-[0.28em] text-mist">Liga</p>
          <div class="grid gap-1.5">
            <template x-for="item in items" :key="item.key">
              <a href="#" @click.prevent="load(item.key)"
                 class="group flex items-center gap-3 rounded-xl px-3.5 py-3 font-display text-lg font-semibold tracking-wide transition-colors"
                 :class="isActive(item.key)
                   ? 'bg-flame-500/10 text-ink ring-1 ring-inset ring-flame-500/35'
                   : 'text-mist hover:bg-elevated hover:text-ink'">
                <span class="size-5 shrink-0 transition-colors" :class="isActive(item.key) ? 'text-flame-400' : 'text-mist group-hover:text-ink'" x-html="item.icon"></span>
                <span x-text="item.label"></span>
              </a>
            </template>
          </div>
        </nav>

        <div class="border-t border-line px-6 py-5">
          <div class="flex items-center gap-2.5">
            <span class="relative flex size-2.5">
              <span class="absolute inline-flex size-full animate-ping rounded-full bg-volt-400/70"></span>
              <span class="relative inline-flex size-2.5 rounded-full bg-volt-400"></span>
            </span>
            <span class="font-display text-sm font-semibold tracking-wide text-mist">Season 1 · Live</span>
          </div>
        </div>
      </aside>

      <main class="min-w-0 px-4 pb-16 pt-20 md:px-8 md:pt-10 lg:px-12">
        <div class="view mx-auto max-w-6xl" x-ref="view"></div>
      </main>

    </div>

    <!-- Info-Popover (geteilt, Light-Dismiss) -->
    <div popover id="stat-info" class="modal-pop w-[20rem] max-w-[calc(100vw-2rem)] rounded-2xl border border-line bg-panel p-5 text-ink">
      <div class="flex items-start gap-3">
        <span class="mt-0.5 grid size-7 shrink-0 place-items-center rounded-full bg-flame-500/15 text-flame-400" aria-hidden="true">
          <svg viewBox="0 0 24 24" class="size-4" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 11v5" stroke-linecap="round"/><circle cx="12" cy="7.6" r="0.6" fill="currentColor"/></svg>
        </span>
        <div class="min-w-0">
          <p class="font-display text-sm font-bold uppercase tracking-wider text-ink" x-text="info.title"></p>
          <p class="mt-1 text-sm leading-relaxed text-mist" x-text="info.text"></p>
        </div>
      </div>
    </div>

    <!-- Globale Suche (Strg/⌘ + K) -->
    <div popover id="search-pop" class="search-pop w-[38rem] max-w-[calc(100vw-1.5rem)] rounded-2xl border border-line bg-panel text-ink"
         @keydown.down.prevent="searchMove(1)" @keydown.up.prevent="searchMove(-1)" @keydown.enter.prevent="selectSearch()">
      <div class="flex items-center gap-3 border-b border-line px-4 py-3">
        <svg viewBox="0 0 24 24" class="size-5 shrink-0 text-mist" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input x-ref="searchInput" x-model="searchQ" @input="searchIndex = 0" type="text" placeholder="Teams, Pokémon oder Matches suchen…"
               class="min-w-0 flex-1 bg-transparent text-ink placeholder:text-mist focus:outline-none" />
        <kbd class="hidden shrink-0 rounded border border-line bg-void px-1.5 py-0.5 font-display text-[10px] font-semibold text-mist sm:block">ESC</kbd>
      </div>
      <div class="max-h-[60vh] overflow-y-auto p-2">
        <template x-if="searchQ.trim() && !searchResults.length">
          <p class="px-3 py-6 text-center text-sm text-mist">Keine Treffer.</p>
        </template>
        <template x-for="(res, i) in searchResults" :key="res.type + '-' + res.label + '-' + i">
          <button type="button" @click="selectSearch(res)" @mousemove="searchIndex = i"
                  class="flex w-full items-center gap-3 rounded-xl px-3 py-2.5 text-left transition-colors"
                  :class="i === searchIndex ? 'bg-elevated' : 'hover:bg-elevated/50'">
            <span class="grid size-9 shrink-0 place-items-center overflow-hidden rounded-lg border border-line bg-elevated/60">
              <template x-if="res.image"><img :src="res.image" :alt="res.label" class="size-7 object-contain" /></template>
              <template x-if="res.logo"><img :src="res.logo" :alt="res.label" class="size-7 object-contain" /></template>
              <template x-if="!res.image && !res.logo">
                <svg viewBox="0 0 24 24" class="size-4 text-mist" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2 4 14h7l-1 8 9-12h-7z"/></svg>
              </template>
            </span>
            <span class="min-w-0 flex-1">
              <span class="block truncate font-semibold text-ink" x-text="res.label"></span>
              <span x-show="res.sub" class="block truncate text-xs text-mist" x-text="res.sub"></span>
            </span>
            <span class="shrink-0 rounded-full border border-line px-2 py-0.5 text-[10px] font-semibold uppercase tracking-wider text-mist" x-text="res.type"></span>
          </button>
        </template>
      </div>
    </div>

    <!-- Toasts: Pick-Benachrichtigungen für alle Nutzer auf der Seite -->
    <div class="pointer-events-none fixed inset-x-0 bottom-0 z-[60] flex flex-col items-center gap-2 p-4 sm:items-end">
      <template x-for="t in toasts" :key="t.id">
        <div class="pointer-events-auto flex w-full max-w-sm items-center gap-3 rounded-xl border border-flame-500/40 bg-panel/95 px-4 py-3 shadow-lg shadow-black/50 backdrop-blur"
             x-transition:enter="transition ease-out duration-300"
             x-transition:enter-start="opacity-0 translate-y-3"
             x-transition:enter-end="opacity-100 translate-y-0"
             x-transition:leave="transition ease-in duration-200"
             x-transition:leave-start="opacity-100"
             x-transition:leave-end="opacity-0">
          <template x-if="t.icon">
            <img :src="t.icon" alt="" class="size-9 shrink-0 object-contain" />
          </template>
          <span x-show="!t.icon" class="grid size-9 shrink-0 place-items-center rounded-lg bg-flame-500/15 text-flame-400" aria-hidden="true">
            <svg viewBox="0 0 24 24" class="size-5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h6"/><path d="M15 12h6"/><circle cx="12" cy="12" r="2.6"/></svg>
          </span>
          <p class="min-w-0 flex-1 text-sm font-semibold text-ink" x-text="t.msg"></p>
        </div>
      </template>
    </div>
  </div>

  </div>

  <script type="module" src="./resources/js/main.js"></script>
</body>
</html>
