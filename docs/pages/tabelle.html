<div x-data="standingsView">
  <header class="mb-8">
    <p class="font-display text-xs font-semibold uppercase tracking-[0.3em] text-flame-400">Standings</p>
    <h1 class="mt-1 font-display text-4xl font-bold tracking-wide text-ink md:text-5xl">Tabelle</h1>
    <p class="mt-2 text-mist">Ein Punkt pro gewonnenem Kampf. Bei Gleichstand entscheidet die Kill-Differenz.</p>
  </header>

  <div x-show="!loaded" class="py-12 text-center text-mist">Lade Tabelle…</div>

  <section x-show="loaded" class="overflow-hidden rounded-2xl border border-line bg-panel">
    <div class="overflow-x-auto">
      <table class="w-full min-w-[44rem] text-left">
        <thead>
          <tr class="border-b border-line font-display text-xs font-semibold uppercase tracking-wider text-mist">
            <th class="px-5 py-4">#</th>
            <th class="px-5 py-4">Team</th>
            <th class="px-5 py-4 text-center" title="Matches">Sp</th>
            <th class="px-5 py-4 text-center" title="Gewonnene Kämpfe">S</th>
            <th class="px-5 py-4 text-center" title="Unentschiedene Kämpfe">U</th>
            <th class="px-5 py-4 text-center" title="Verlorene Kämpfe">N</th>
            <th class="px-5 py-4 text-center" title="Kills : Deaths">K:D</th>
            <th class="px-5 py-4 text-center" title="Kill-Differenz">Diff</th>
            <th class="px-5 py-4 text-right">Pkt</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-line">
          <template x-for="(row, idx) in rows" :key="row.team.id">
            <tr class="cursor-pointer transition-colors hover:bg-elevated/40"
                :class="idx === 0 ? 'bg-flame-500/[0.07]' : ''"
                @click="$dispatch('navigate', { key:'teams', teamId: row.team.id })">
              <td class="px-5 py-4">
                <span class="font-display text-lg font-bold" :class="idx < 3 ? (idx === 0 ? 'text-flame-400' : 'text-volt-400') : 'text-mist'" x-text="idx + 1"></span>
              </td>
              <td class="px-5 py-4">
                <div class="flex items-center gap-3">
                  <img :src="logoUrl(row.team.logo)" :alt="row.team.name" class="size-9 shrink-0 rounded-lg object-contain" />
                  <div class="min-w-0">
                    <div class="truncate font-semibold text-ink" x-text="row.team.name"></div>
                    <div class="truncate text-sm font-medium" :style="`color:${playerColor(row.team.player)}`" x-text="row.team.player"></div>
                  </div>
                </div>
              </td>
              <td class="px-5 py-4 text-center tabular-nums text-ink" x-text="row.played"></td>
              <td class="px-5 py-4 text-center tabular-nums text-ink" x-text="row.won"></td>
              <td class="px-5 py-4 text-center tabular-nums text-mist" x-text="row.draw"></td>
              <td class="px-5 py-4 text-center tabular-nums text-mist" x-text="row.lost"></td>
              <td class="px-5 py-4 text-center tabular-nums text-ink" x-text="`${row.kills}:${row.deaths}`"></td>
              <td class="px-5 py-4 text-center tabular-nums" :class="row.diff > 0 ? 'text-volt-400' : (row.diff < 0 ? 'text-mist' : 'text-mist')" x-text="fmtDiff(row.diff)"></td>
              <td class="px-5 py-4 text-right font-display text-lg font-bold tabular-nums text-ink" x-text="row.points"></td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>
    <p x-show="rows.length === 0" class="px-5 py-8 text-center text-mist">Noch keine Teams.</p>
  </section>

  <!-- MODUL: Platzierungsverlauf aller Teams -->
  <section x-show="loaded" class="mt-8 rounded-2xl border border-line bg-panel p-6">
    <h2 class="mb-4 font-display text-xl font-bold uppercase tracking-wider text-ink">Platzierungsverlauf</h2>
    <div x-show="curve.hasData" class="overflow-x-auto" x-html="curveSvg"></div>
    <p x-show="!curve.hasData" class="py-8 text-center text-sm text-mist">Noch keine gespielten Spieltage.</p>
    <div x-show="curve.hasData" class="mt-4 flex flex-wrap gap-x-4 gap-y-2">
      <template x-for="ln in curve.lines" :key="ln.teamId">
        <div class="flex cursor-pointer items-center gap-2 text-mist transition-colors hover:text-ink"
             @click="$dispatch('navigate', { key:'teams', teamId: ln.teamId })">
          <img :src="logoUrl(teamById(ln.teamId)?.logo)" :alt="teamById(ln.teamId)?.name" class="size-6 shrink-0 rounded object-contain" />
          <span class="text-sm" x-text="teamById(ln.teamId)?.name"></span>
        </div>
      </template>
    </div>
  </section>

  <!-- MODUL: Pokémon-Ranking (liga-weit) -->
  <section x-show="loaded" class="mt-6 rounded-2xl border border-line bg-panel p-6">
    <div class="mb-4 flex flex-col items-start gap-3 sm:flex-row sm:items-center sm:justify-between">
      <h2 class="font-display text-xl font-bold uppercase tracking-wider text-ink">Pokémon-Ranking</h2>
      <div class="flex w-full items-center gap-2 sm:w-auto">
        <div class="flex flex-1 overflow-x-auto rounded-xl border border-line bg-elevated p-1 sm:flex-none">
          <template x-for="m in statModes" :key="m.key">
            <button type="button" @click="setStatMode(m.key)"
                    class="shrink-0 whitespace-nowrap rounded-lg px-3 py-2 text-sm font-semibold transition-colors"
                    :class="statMode === m.key ? 'bg-flame-500 text-white' : 'text-mist hover:text-ink'"
                    x-text="m.label"></button>
          </template>
        </div>
        <button type="button" @click="toggleStatDir()"
                class="grid size-10 shrink-0 place-items-center rounded-xl border border-line font-bold text-mist transition-colors hover:text-ink"
                :title="statDir === 'desc' ? 'Absteigend' : 'Aufsteigend'" x-text="statDir === 'desc' ? '↓' : '↑'"></button>
      </div>
    </div>
    <div class="grid grid-cols-2 gap-3 sm:grid-cols-3 lg:grid-cols-5 xl:grid-cols-6">
      <template x-for="(s, i) in ranking" :key="s.pokemon.name">
        <div class="relative cursor-pointer rounded-2xl border border-line bg-elevated p-3 text-center transition-colors hover:border-flame-500/40 hover:bg-elevated/60"
             @click.stop="goMon(s.pokemon.name)"
             :style="`view-transition-name:${vtName(s.pokemon)}`">
          <div class="flex items-center justify-between px-1">
            <span class="font-display text-xs font-bold tabular-nums text-mist" x-text="`#${i + 1}`"></span>
            <span class="font-display text-2xl font-bold tabular-nums text-flame-400" x-text="s[statMode]"></span>
          </div>
          <div class="relative my-1 grid aspect-square place-items-center overflow-hidden rounded-xl bg-panel">
            <img :src="logoUrl(s.team?.logo)" alt="" aria-hidden="true" class="absolute inset-0 size-full scale-110 object-contain opacity-20" />
            <img :src="s.pokemon.image" :alt="s.pokemon.name" loading="lazy" class="relative h-4/5 w-4/5 object-contain" />
          </div>
          <p class="truncate text-sm font-semibold text-ink" x-text="s.pokemon.name" :title="s.pokemon.name"></p>
          <p class="mt-0.5 truncate text-xs text-flame-400/80" x-text="s.team?.name" :title="s.team?.name"></p>
        </div>
      </template>
    </div>
    <p x-show="ranking.length === 0" class="text-sm text-mist">Noch keine Daten.</p>
  </section>
</div>
