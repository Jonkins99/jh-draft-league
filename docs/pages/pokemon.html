<div x-data="pokemonView()">

  <!-- ZURÜCK-LEISTE -->
  <button type="button" @click="back()"
          class="mb-6 inline-flex items-center gap-2 font-display text-sm font-semibold uppercase tracking-wider text-mist transition-colors hover:text-flame-400">
    <svg viewBox="0 0 24 24" class="size-4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    Zurück
  </button>

  <!-- LADEZUSTAND -->
  <div x-show="!loaded" class="py-12 text-center text-mist">Lade Pokémon…</div>

  <!-- NICHT GEFUNDEN -->
  <div x-show="loaded && !mon" class="rounded-2xl border border-line bg-panel p-10 text-center">
    <p class="font-display text-2xl font-bold text-ink">Pokémon nicht gefunden</p>
    <p class="mt-2 text-mist">Dieses Pokémon existiert nicht in den Stammdaten.</p>
  </div>

  <!-- INHALT -->
  <template x-if="loaded && mon">
    <div>

      <!-- HERO -->
      <section class="overflow-hidden rounded-2xl border border-line bg-panel p-6 md:p-8">
        <div class="flex flex-col gap-6 sm:flex-row sm:items-start">
          <!-- Pokémon-Bild mit Team-Wappen als Hintergrund -->
          <div class="relative grid size-36 shrink-0 place-items-center self-center overflow-hidden rounded-2xl border border-line bg-elevated/60 sm:size-44 sm:self-start">
            <template x-if="team">
              <img :src="logoUrl(team.logo)" :alt="team.name"
                   class="pointer-events-none absolute inset-0 size-full object-contain p-5 opacity-20" />
            </template>
            <img :src="mon.image" :alt="mon.name" class="relative z-10 h-4/5 w-4/5 object-contain" />
          </div>

          <!-- Kopf-Infos -->
          <div class="min-w-0 flex-1">
            <p class="font-display text-xs font-semibold uppercase tracking-[0.3em] text-flame-400">Pokémon</p>
            <h1 class="mt-1 break-words font-display text-4xl font-bold tracking-wide text-ink md:text-5xl" x-text="mon.name"></h1>
            <p x-show="mon.name_en" class="mt-0.5 text-sm text-mist" x-text="mon.name_en"></p>

            <!-- Typen + Meta-Badges -->
            <div class="mt-3 flex flex-wrap items-center gap-2">
              <template x-for="t in (mon.types || [])" :key="t">
                <span class="rounded px-2 py-0.5 text-xs font-bold uppercase tracking-wide"
                      :style="`color:${typeColor(t)}; background:${typeColor(t)}22`" x-text="t"></span>
              </template>
              <span x-show="mon.tier" class="inline-flex items-center gap-1.5 rounded-full px-2.5 py-0.5 text-xs font-bold"
                    :style="`color:${tierColor(mon.tier)}; background:${tierColor(mon.tier)}26`">
                <span x-text="`Tier ${mon.tier}`"></span>
                <span x-show="Number.isFinite(mon.cost)" class="opacity-80" x-text="`· ${mon.cost} P`"></span>
              </span>
              <span x-show="Number.isFinite(mon.dex)" class="rounded-full border border-line px-2.5 py-0.5 text-xs font-semibold tabular-nums text-mist" x-text="`#${mon.dex}`"></span>
            </div>

            <!-- Team + Draft -->
            <div class="mt-4 flex flex-wrap items-center gap-2.5">
              <template x-if="team">
                <button type="button" @click="$dispatch('navigate', { key: 'teams', teamId: team.id })"
                        class="group inline-flex items-center gap-3 rounded-xl border border-line bg-elevated/60 p-2 pr-4 text-left transition-colors hover:border-flame-500/40">
                  <img :src="logoUrl(team.logo)" :alt="team.name" class="size-10 shrink-0 rounded-lg object-contain" />
                  <span class="min-w-0">
                    <span class="block truncate font-display font-bold" :style="`color:${playerColor(team.player)}`" x-text="team.name"></span>
                    <span class="block truncate text-xs font-semibold text-mist" x-text="team.player"></span>
                  </span>
                </button>
              </template>
              <template x-if="!team">
                <span class="inline-flex items-center rounded-full border border-line px-3 py-1 text-sm font-semibold text-mist">Nicht gedraftet</span>
              </template>
              <template x-if="draftPick">
                <span class="inline-flex items-center gap-2 rounded-xl border border-line bg-elevated/60 px-3 py-2.5">
                  <span class="font-display text-[10px] font-semibold uppercase tracking-wider text-mist">Draft</span>
                  <span class="font-display text-sm font-bold text-ink" x-text="`R${draftPick.round} · #${draftPick.pickNo}`"></span>
                </span>
              </template>
            </div>
          </div>
        </div>

        <!-- INITIATIVE -->
        <div class="mt-7 grid gap-5 border-t border-line pt-6 lg:grid-cols-[auto_1fr]">
          <!-- Base + Rang -->
          <div class="flex items-center gap-5 lg:flex-col lg:items-start lg:justify-center">
            <div>
              <p class="font-display text-xs font-semibold uppercase tracking-wider text-mist">Init (Base)</p>
              <p class="font-display text-5xl font-bold tabular-nums text-ink" x-text="Number.isFinite(mon.base_speed) ? mon.base_speed : '—'"></p>
            </div>
            <p x-show="speedRank" class="max-w-[12rem] text-sm text-mist">
              schneller als <span class="font-bold text-flame-400" x-text="speedRank?.faster"></span> von <span class="font-bold text-ink" x-text="speedRank?.total"></span>
              <span class="block text-xs">Rang <span x-text="`#${speedRank?.rank}`"></span></span>
            </p>
          </div>

          <!-- Varianten-Raster -->
          <div x-show="speedRows.length" class="-mx-1 overflow-x-auto px-1">
            <table class="w-full min-w-[20rem] border-collapse text-center text-sm">
              <thead>
                <tr class="border-b border-line">
                  <th class="py-2 pr-2 text-left font-display text-[10px] font-semibold uppercase tracking-wider text-mist">Invest.</th>
                  <th class="px-2 py-2 font-display text-[10px] font-semibold uppercase tracking-wider"  :style="`color:${modColor('x1')}`">×1</th>
                  <th class="px-2 py-2 font-display text-[10px] font-semibold uppercase tracking-wider" :style="`color:${modColor('x15')}`">×1,5</th>
                  <th class="px-2 py-2 font-display text-[10px] font-semibold uppercase tracking-wider" :style="`color:${modColor('x2')}`">×2</th>
                </tr>
              </thead>
              <tbody>
                <template x-for="invKey in ['s0','s32','s32n']" :key="invKey">
                  <tr class="border-b border-line/40">
                    <td class="py-1.5 pr-2 text-left">
                      <span class="inline-block rounded px-1.5 py-0.5 text-xs font-bold" :style="`color:${invColor(invKey)};background:${invColor(invKey)}1f`" x-text="speedRows.find(r => r.invKey === invKey)?.inv"></span>
                    </td>
                    <td class="px-2 py-1.5 font-display text-base font-bold tabular-nums text-ink" x-text="speedRows.find(r => r.invKey === invKey && r.modKey === 'x1')?.speed"></td>
                    <td class="px-2 py-1.5 font-display text-base font-bold tabular-nums text-ink" x-text="speedRows.find(r => r.invKey === invKey && r.modKey === 'x15')?.speed"></td>
                    <td class="px-2 py-1.5 font-display text-base font-bold tabular-nums text-ink" x-text="speedRows.find(r => r.invKey === invKey && r.modKey === 'x2')?.speed"></td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>
        </div>
      </section>

      <!-- TYP-TABELLE -->
      <section class="mt-6">
        <!-- Defensiv -->
        <div class="rounded-2xl border border-line bg-panel p-5 sm:p-6">
          <h2 class="mb-1 font-display text-xl font-bold uppercase tracking-wider text-ink">Defensiv</h2>
          <p class="mb-4 text-sm text-mist">Schaden eingehender Angriffstypen.</p>
          <div class="grid grid-cols-3 gap-2 sm:grid-cols-6">
            <template x-for="c in defChart" :key="'def-'+c.type">
              <div class="rounded-lg border border-line bg-elevated/40 p-1.5 text-center">
                <span class="inline-block w-full truncate rounded px-1 py-0.5 text-[9px] font-bold uppercase tracking-wide" :style="`color:${typeColor(c.type)};background:${typeColor(c.type)}22`" x-text="c.type" :title="c.type"></span>
                <span class="mt-1 grid h-7 place-items-center rounded font-display text-sm font-bold tabular-nums" :style="multStyle(c.mult)" x-text="multLabel(c.mult)" :title="`×${c.mult}`"></span>
              </div>
            </template>
          </div>
        </div>
      </section>

      <!-- STATISTIK-KACHELN -->
      <template x-if="profile">
        <div>
          <!-- Kein Spiel gespielt -->
          <section x-show="profile.teamBattlesTotal === 0" class="mt-6 rounded-2xl border border-line bg-panel p-6 text-center text-mist">
            <span x-text="team ? 'Noch keine Kämpfe gespielt.' : 'Nicht gedraftet — keine Statistik.'"></span>
          </section>

          <section x-show="profile.teamBattlesTotal > 0" class="mt-8">
            <h2 class="mb-4 font-display text-xl font-bold uppercase tracking-wider text-ink">Statistik</h2>
            <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 xl:grid-cols-4">

              <!-- Matchups -->
              <div class="rounded-2xl border border-line bg-panel p-5">
                <p class="flex items-center gap-1 font-display text-xs font-semibold uppercase tracking-wider text-mist">
                  Matchups
                  <button type="button" @click="statInfo('matchups')" class="text-mist/60 hover:text-flame-400" aria-label="Erklärung"><svg viewBox="0 0 24 24" class="size-3.5" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 11v5" stroke-linecap="round"/><circle cx="12" cy="7.6" r="0.6" fill="currentColor"/></svg></button>
                </p>
                <div class="mt-1 flex items-end gap-2">
                  <span class="font-display text-4xl font-bold tabular-nums text-ink" x-text="profile.matchups"></span>
                  <span class="pb-1.5 text-sm text-mist" x-text="`/ ${profile.teamMatchesPlayed}`"></span>
                </div>
                <p class="mt-1 text-sm font-semibold text-flame-400" x-text="`${fmtPct(profile.matchupPct)} der Matches`"></p>
              </div>

              <!-- Kampf-Beteiligung -->
              <div class="rounded-2xl border border-line bg-panel p-5">
                <p class="flex items-center gap-1 font-display text-xs font-semibold uppercase tracking-wider text-mist">
                  Kampf-Einsätze
                  <button type="button" @click="statInfo('battles')" class="text-mist/60 hover:text-flame-400" aria-label="Erklärung"><svg viewBox="0 0 24 24" class="size-3.5" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 11v5" stroke-linecap="round"/><circle cx="12" cy="7.6" r="0.6" fill="currentColor"/></svg></button>
                </p>
                <div class="mt-1 flex items-end gap-2">
                  <span class="font-display text-4xl font-bold tabular-nums text-ink" x-text="profile.battles"></span>
                  <span class="pb-1.5 text-sm text-mist" x-text="`/ ${profile.teamBattlesTotal}`"></span>
                </div>
                <div class="mt-2 space-y-0.5 text-sm text-mist">
                  <p>Anteil gesamt: <span class="font-semibold text-ink" x-text="fmtPct(profile.battlePctTotal)"></span></p>
                  <p>Bei Aufgebot: <span class="font-semibold text-ink" x-text="fmtPct(profile.battlePctAvailable)"></span></p>
                  <p>Bank: <span class="font-semibold text-ink" x-text="profile.benched"></span></p>
                </div>
              </div>

              <!-- K/D -->
              <div class="rounded-2xl border border-line bg-panel p-5">
                <p class="flex items-center gap-1 font-display text-xs font-semibold uppercase tracking-wider text-mist">
                  K / D
                  <button type="button" @click="info('K / D', 'Kills (besiegte Gegner) zu Deaths (selbst besiegt). Rechts die abgeleiteten Werte.')" class="text-mist/60 hover:text-flame-400" aria-label="Erklärung"><svg viewBox="0 0 24 24" class="size-3.5" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 11v5" stroke-linecap="round"/><circle cx="12" cy="7.6" r="0.6" fill="currentColor"/></svg></button>
                </p>
                <div class="mt-1 flex items-end gap-1.5 font-display text-4xl font-bold tabular-nums">
                  <span class="text-volt-400" x-text="profile.kills"></span>
                  <span class="text-mist/50 text-2xl">:</span>
                  <span class="text-flame-400" x-text="profile.deaths"></span>
                </div>
                <div class="mt-2 space-y-0.5 text-sm text-mist">
                  <p>K/D: <span class="font-semibold text-ink" x-text="profile.kd.toFixed(2)"></span> <button type="button" @click="statInfo('kd')" class="align-middle text-mist/60 hover:text-flame-400" aria-label="Erklärung"><svg viewBox="0 0 24 24" class="inline size-3" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 11v5" stroke-linecap="round"/><circle cx="12" cy="7.6" r="0.6" fill="currentColor"/></svg></button></p>
                  <p>Kills/Kampf: <span class="font-semibold text-ink" x-text="profile.killsPerBattle.toFixed(2)"></span> <button type="button" @click="statInfo('killsPerBattle')" class="align-middle text-mist/60 hover:text-flame-400" aria-label="Erklärung"><svg viewBox="0 0 24 24" class="inline size-3" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 11v5" stroke-linecap="round"/><circle cx="12" cy="7.6" r="0.6" fill="currentColor"/></svg></button></p>
                  <p>Überlebt: <span class="font-semibold text-ink" x-text="fmtPct(profile.survivalRate)"></span> <button type="button" @click="statInfo('survivalRate')" class="align-middle text-mist/60 hover:text-flame-400" aria-label="Erklärung"><svg viewBox="0 0 24 24" class="inline size-3" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 11v5" stroke-linecap="round"/><circle cx="12" cy="7.6" r="0.6" fill="currentColor"/></svg></button></p>
                </div>
              </div>

              <!-- Siegquoten: Kampf + Match (mit/ohne) -->
              <div class="rounded-2xl border border-line bg-panel p-5">
                <p class="flex items-center gap-1 font-display text-xs font-semibold uppercase tracking-wider text-mist">
                  Siegquoten
                </p>
                <div class="mt-2 space-y-2.5">
                  <div>
                    <div class="flex items-baseline justify-between">
                      <span class="flex items-center gap-1 text-sm text-mist">Kampf
                        <button type="button" @click="statInfo('battleWinPct')" class="text-mist/60 hover:text-flame-400" aria-label="Erklärung"><svg viewBox="0 0 24 24" class="size-3" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 11v5" stroke-linecap="round"/><circle cx="12" cy="7.6" r="0.6" fill="currentColor"/></svg></button>
                      </span>
                      <span class="font-display text-lg font-bold text-volt-400" x-text="fmtPct(profile.battleRecord.winPct)"></span>
                    </div>
                    <p class="text-xs text-mist" x-text="`${profile.battleRecord.w}-${profile.battleRecord.d}-${profile.battleRecord.l} (${profile.battleRecord.total})`"></p>
                  </div>
                  <div class="border-t border-line/60 pt-2">
                    <div class="flex items-baseline justify-between">
                      <span class="flex items-center gap-1 text-sm text-mist">Match mit
                        <button type="button" @click="statInfo('matchWinPct')" class="text-mist/60 hover:text-flame-400" aria-label="Erklärung"><svg viewBox="0 0 24 24" class="size-3" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 11v5" stroke-linecap="round"/><circle cx="12" cy="7.6" r="0.6" fill="currentColor"/></svg></button>
                      </span>
                      <span class="font-display text-lg font-bold text-flame-400" x-text="fmtPct(profile.matchRecordWith.winPct)"></span>
                    </div>
                    <p class="text-xs text-mist" x-text="`${profile.matchRecordWith.w}-${profile.matchRecordWith.d}-${profile.matchRecordWith.l} (${profile.matchRecordWith.total})`"></p>
                  </div>
                  <div class="border-t border-line/60 pt-2">
                    <div class="flex items-baseline justify-between">
                      <span class="text-sm text-mist">Match ohne</span>
                      <span class="font-display text-lg font-bold text-mist" x-text="fmtPct(profile.matchRecordWithout.winPct)"></span>
                    </div>
                    <p class="text-xs text-mist" x-text="`${profile.matchRecordWithout.w}-${profile.matchRecordWithout.d}-${profile.matchRecordWithout.l} (${profile.matchRecordWithout.total})`"></p>
                  </div>
                </div>
              </div>
            </div>
          </section>

          <!-- KILL/DEATH-HISTORIE -->
          <section x-show="profile.teamBattlesTotal > 0" class="mt-8 rounded-2xl border border-line bg-panel p-5 sm:p-6">
            <h2 class="mb-4 font-display text-xl font-bold uppercase tracking-wider text-ink">Kill- &amp; Death-Historie</h2>
            <ul x-show="profile.history.length" class="divide-y divide-line/70">
              <template x-for="(h, hi) in profile.history" :key="'h-'+hi">
                <li class="flex items-center gap-3 py-2.5">
                  <span class="grid size-6 shrink-0 place-items-center rounded-md font-display text-[11px] font-bold"
                        :class="h.kind === 'kill' ? 'bg-volt-400/15 text-volt-400' : 'bg-flame-500/15 text-flame-400'"
                        x-text="h.kind === 'kill' ? 'K' : 'D'" :title="h.kind === 'kill' ? 'Kill' : 'Death'"></span>
                  <button type="button"
                          class="grid size-11 shrink-0 place-items-center rounded-lg border border-line bg-elevated/60"
                          :class="h.otherName ? 'cursor-pointer transition-colors hover:border-flame-500/40' : 'cursor-default'"
                          @click.stop="h.otherName && goMon(h.otherName)">
                    <template x-if="h.otherName">
                      <img :src="monImage(h.otherName)" :alt="h.otherName" class="size-9 object-contain" />
                    </template>
                    <template x-if="!h.otherName">
                      <span class="text-mist">—</span>
                    </template>
                  </button>
                  <div class="min-w-0 flex-1">
                    <p class="truncate text-sm">
                      <span class="text-mist" x-text="h.kind === 'kill' ? 'besiegt ' : 'besiegt von '"></span>
                      <span x-show="h.otherName" class="cursor-pointer font-semibold text-ink transition-colors hover:text-flame-400" @click.stop="goMon(h.otherName)" x-text="h.otherName"></span>
                      <span x-show="!h.otherName" class="font-semibold text-mist">unbekannt</span>
                    </p>
                    <p class="mt-0.5 flex flex-wrap items-center gap-1.5 text-xs text-mist">
                      <span x-text="`Spieltag ${h.day}`"></span>
                      <span x-show="h.opponentTeamName" x-text="`· vs ${h.opponentTeamName}`"></span>
                      <span x-show="h.self" class="rounded bg-flame-500/15 px-1.5 py-0.5 font-bold text-flame-400">Self-Kill</span>
                      <span x-show="h.none" class="rounded bg-mist/15 px-1.5 py-0.5 font-bold text-mist">nicht angerechnet</span>
                    </p>
                  </div>
                </li>
              </template>
            </ul>
            <p x-show="!profile.history.length" class="text-sm text-mist">Noch keine Kills oder Deaths.</p>
          </section>

          <!-- PARTNER & GEGNER -->
          <section x-show="profile.teamBattlesTotal > 0" class="mt-8">
            <h2 class="mb-4 font-display text-xl font-bold uppercase tracking-wider text-ink">Partner &amp; Gegner</h2>
            <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 xl:grid-cols-4">
              <template x-for="grp in [
                { label: 'Partner', sub: 'Nach Kämpfen', accent: '#63bc5a', list: profile.partnersByBattle },
                { label: 'Gegner', sub: 'Nach Kämpfen', accent: '#ff5a36', list: profile.opponentsByBattle },
                { label: 'Partner', sub: 'Nach Matchups', accent: '#63bc5a', list: profile.partnersByMatchup },
                { label: 'Gegner', sub: 'Nach Matchups', accent: '#ff5a36', list: profile.opponentsByMatchup }
              ]" :key="grp.sub + grp.label">
                <div class="rounded-2xl border border-line bg-panel p-5">
                  <div class="mb-3">
                    <p class="font-display text-xs font-bold uppercase tracking-wider" :style="`color:${grp.accent}`" x-text="grp.label"></p>
                    <p class="text-[11px] font-semibold uppercase tracking-wider text-mist" x-text="grp.sub"></p>
                  </div>
                  <ul x-show="grp.list.length" class="space-y-2">
                    <template x-for="p in grp.list.slice(0,5)" :key="grp.sub+grp.label+'-'+p.name">
                      <li class="flex items-center gap-2.5">
                        <button type="button" @click.stop="goMon(p.name)"
                                class="grid size-9 shrink-0 place-items-center rounded-lg border border-line bg-elevated/60 transition-colors hover:border-flame-500/40">
                          <img :src="monImage(p.name)" :alt="p.name" class="size-7 object-contain" />
                        </button>
                        <span class="min-w-0 flex-1 cursor-pointer truncate text-sm font-medium text-ink transition-colors hover:text-flame-400" @click.stop="goMon(p.name)" x-text="p.name" :title="p.name"></span>
                        <span class="shrink-0 rounded-md bg-elevated px-1.5 py-0.5 font-display text-xs font-bold tabular-nums text-mist" x-text="`${p.count}×`"></span>
                      </li>
                    </template>
                  </ul>
                  <p x-show="!grp.list.length" class="text-sm text-mist">—</p>
                </div>
              </template>
            </div>

            <!-- Lieblingsopfer / Angstgegner -->
            <div class="mt-4 grid grid-cols-1 gap-4 md:grid-cols-2">
              <template x-for="blk in [
                { label: 'Lieblingsopfer', hint: 'Am häufigsten besiegt', accent: '#63bc5a', list: profile.topVictims, empty: 'Noch keine Kills.' },
                { label: 'Angstgegner', hint: 'Am häufigsten unterlegen', accent: '#ff5a36', list: profile.topNemeses, empty: 'Noch nie besiegt worden.' }
              ]" :key="blk.label">
                <div class="rounded-2xl border border-line bg-panel p-5">
                  <div class="mb-3 flex items-baseline justify-between gap-2">
                    <p class="font-display text-xs font-bold uppercase tracking-wider" :style="`color:${blk.accent}`" x-text="blk.label"></p>
                    <p class="text-[11px] text-mist" x-text="blk.hint"></p>
                  </div>
                  <ul x-show="blk.list.length" class="space-y-2">
                    <template x-for="(v, vi) in blk.list.slice(0,5)" :key="blk.label+'-'+v.name">
                      <li class="flex items-center gap-2.5">
                        <span class="w-4 shrink-0 text-center font-display text-xs font-bold text-mist/60" x-text="vi + 1"></span>
                        <button type="button" @click.stop="goMon(v.name)"
                                class="grid size-10 shrink-0 place-items-center rounded-lg border border-line bg-elevated/60 transition-colors hover:border-flame-500/40">
                          <img :src="monImage(v.name)" :alt="v.name" class="size-8 object-contain" />
                        </button>
                        <span class="min-w-0 flex-1 cursor-pointer truncate text-sm font-medium text-ink transition-colors hover:text-flame-400" @click.stop="goMon(v.name)" x-text="v.name" :title="v.name"></span>
                        <span class="shrink-0 font-display text-sm font-bold tabular-nums" :style="`color:${blk.accent}`" x-text="`${v.count}×`"></span>
                      </li>
                    </template>
                  </ul>
                  <p x-show="!blk.list.length" class="text-sm text-mist" x-text="blk.empty"></p>
                </div>
              </template>
            </div>
          </section>

          <!-- PERFORMANCE-TIMELINE -->
          <section x-show="profile.timeline.length" class="mt-8 rounded-2xl border border-line bg-panel p-5 sm:p-6">
            <h2 class="mb-4 font-display text-xl font-bold uppercase tracking-wider text-ink">Verlauf</h2>
            <div class="-mx-1 overflow-x-auto px-1">
              <div class="flex min-w-min gap-2">
                <template x-for="(t, ti) in profile.timeline" :key="'tl-'+ti">
                  <div class="w-20 shrink-0 rounded-xl border border-line bg-elevated/50 p-2.5 text-center"
                       :style="t.outcome === 'win' ? 'border-color:rgba(255,203,5,0.4)' : (t.outcome === 'loss' ? 'border-color:rgba(227,53,13,0.4)' : '')">
                    <p class="font-display text-xs font-semibold text-mist" x-text="`ST ${t.day}`"></p>
                    <div class="my-2 flex items-end justify-center gap-1.5 font-display text-lg font-bold tabular-nums">
                      <span :class="t.kills ? 'text-volt-400' : 'text-mist/30'" x-text="t.kills"></span>
                      <span class="text-mist/40 text-sm">/</span>
                      <span :class="t.deaths ? 'text-flame-400' : 'text-mist/30'" x-text="t.deaths"></span>
                    </div>
                    <span class="inline-block rounded px-1.5 py-0.5 text-[10px] font-bold uppercase"
                          :class="t.outcome === 'win' ? 'bg-volt-400/15 text-volt-400' : (t.outcome === 'loss' ? 'bg-flame-500/15 text-flame-400' : (t.outcome === 'draw' ? 'bg-elevated text-mist' : 'bg-elevated text-mist/50'))"
                          x-text="t.outcome === 'win' ? 'Sieg' : (t.outcome === 'loss' ? 'Nied.' : (t.outcome === 'draw' ? 'Remis' : 'offen'))"></span>
                    <div class="mt-1.5 flex justify-center gap-1 text-[9px] text-mist">
                      <span x-show="t.inSquad" title="Im Aufgebot">A</span>
                      <span x-show="t.inBattle" title="Im Kampf eingesetzt" class="text-ink">E</span>
                    </div>
                  </div>
                </template>
              </div>
            </div>
          </section>
        </div>
      </template>

    </div>
  </template>

</div>
